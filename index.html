  <title>Be Ready</title>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    :root{
      --bg:#0a0f1a;--bg2:#0e1520;--bg3:#111d2e;--bg4:#1a2640;--card:#0d1525;
      --acc:#e63946;--acc2:#ff4d5a;--gold:#f5a623;--teal:#06b6d4;
      --green:#10b981;--purple:#8b5cf6;--blue:#3b82f6;--orange:#f97316;
      --text:#f0f4f8;--text2:#94a3b8;--text3:#475569;
      --border:#1e2d42;--border2:#243347;
      --font-d:'Bebas Neue',cursive;--font-b:'DM Sans',sans-serif;
      --safe-top:env(safe-area-inset-top);--safe-bottom:env(safe-area-inset-bottom);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font-b);overflow:hidden}
    #root{height:100%;display:flex;flex-direction:column}
    ::-webkit-scrollbar{display:none}
    input,textarea,select{font-family:var(--font-b)}
  .btn-back{background:#1b263b;color:#fff;border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:600;cursor:pointer}

.card{overflow-wrap:break-word;word-break:break-word}
input,select,textarea{box-sizing:border-box}

/* Largeur uniforme bilans : forcer tous les onglets à pleine largeur */
.scroll > div { width:100% !important; box-sizing:border-box; }
.scroll .card { width:100% !important; box-sizing:border-box; }
.scroll .section-hdr { width:100%; box-sizing:border-box; }

/* Anti-débordement page Routine */
.scroll{overflow-x:hidden!important}
.section-hdr{max-width:100%;box-sizing:border-box;overflow-wrap:break-word}
.cat-badge{flex-shrink:0;max-width:60px;overflow:hidden;text-overflow:ellipsis}
.tag{flex-shrink:0;white-space:normal}
</style>
</head>

function moteurCurrentIsoWeek(){
  const d = new Date(Date.UTC(today.getFullYear(), today.getMonth(), today.getDate()));
  const day = d.getUTCDay() || 7;
  d.setUTCDate(d.getUTCDate() + 4 - day);
  const yearStart = new Date(Date.UTC(d.getUTCFullYear(),0,1));
  const week = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
  return d.getUTCFullYear() + '-W' + String(week).padStart(2,'0');
}

}

// Puissance (cluster/PAP) n'est disponible que via le focus manuel, quand c'est jugé pertinent
// ce jour-là (pas de risque poignet/genou avec des mouvements PAP jambes ou bench).
function moteurCycleType(){
  if(!moteurBlocQualiteActive()) return null;
  return 'force';
}
// Le focus manuel (Force / Puissance / Préparation tests / Semaine tests) prime toujours
// sur le calcul automatique du cycle. 'auto' = laisser le cycle Force décider.
function moteurCycleInfo(){
  if(MS.focusManuel && MS.focusManuel !== 'auto'){
    const f = MPER.focus_manuel[MS.focusManuel];
    if(f) return {type: MS.focusManuel, typeLabel: f.label, phase: 'focus_manuel',
      volume_pct: f.volume_pct, protocole_par_qualite: f.protocole_par_qualite, manuel: true};
  }
  const w = moteurCycleWeek();
  const type = moteurCycleType();
  if(!w || !type) return null;
  const info = MPER.cycles[type].semaines.find(c=>c.semaine===w);
  return Object.assign({type, typeLabel: MPER.cycles[type].label, manuel:false}, info);
}

const M_FORCE_TOPSET = new Set(['militaire_barre','bench_plat_barre']);

  militaire_barre:'Test 5RM (jamais 1RM)', bench_plat_barre:'Test 3RM (jamais 1RM)',
  pendlay_row:'Test 3RM (jamais 1RM)', rdl:'Test 3RM (jamais 1RM)', zercher_squat:'Test 3RM (jamais 1RM)',

function moteurProtocolFor(ex){
  const info = moteurCycleInfo();
  if(!info) return null;
  // Primer/AGT alactique — s'applique largement, indépendamment du mouvement porteur.
  if(ex.category === 'alactique_finisher' && info.protocole_par_qualite && info.protocole_par_qualite.alactique){
    const protoId = info.protocole_par_qualite.alactique;
    const p = MPER.protocoles[protoId];
    return {nom:p.nom, format:p.format, rpe:p.rpe, phase:info.phase, volume_pct:info.volume_pct};
  }
  // Focus tests — format spécifique par exercice, sinon pas de protocole affiché pour cet exercice.
  if(MS.focusManuel === 'semaine_tests'){
    const t = M_TEST_FORMAT[ex.id];
    return t ? {nom:'Test officiel', format:t, rpe:'9-10', phase:'focus_manuel', volume_pct:info.volume_pct} : null;
  }
  if(MS.focusManuel === 'prep_tests'){
    return M_TEST_FORMAT[ex.id] ? {nom:'Préparation test', format:'Paliers progressifs vers sous-max, vitesse gardée', rpe:'7-8', phase:'focus_manuel', volume_pct:info.volume_pct} : null;
  }
  // Déload — toujours pareil, quel que soit le type de cycle.
  if(info.phase === 'deload'){
    return {nom:'Déload', format:'3×3 déload', rpe:'4-5', phase:'deload', volume_pct:50};
  }
  const cycleType = info.type;
  let method = null;
  if(cycleType === 'force') method = M_FORCE_TOPSET.has(ex.id) ? 'top_set' : null;
  else if(cycleType === 'puissance') method = M_PUISSANCE_METHOD[ex.id] || null;
  if(!method) return null;
  const mf = M_METHOD_FORMATS[method];
  const phaseKey = ['leger','modere','pic'].includes(info.phase) ? info.phase : 'modere';
  return {nom:mf.nom, format:mf[phaseKey], rpe:mf.rpe[phaseKey], phase:info.phase, volume_pct:info.volume_pct};
}
// Format standard par défaut quand aucun protocole de cycle ne s'applique (fidèle aux prescriptions
// réelles de Guyane pour les mouvements secondaires/accessoires, pas de top-set partout).
function moteurDefaultFormat(ex){
  if(ex.progression_type === 'aucun') return null;
  if(ex.pattern === 'carry') return '3×30-40m';
  if(ex.category === 'bas_force') return ex.side_rule === 'G_first' ? '3-4×8/côté' : '3-4×6-8';
  if(ex.category === 'haut_force') return '3-4×6-8';
  if(ex.category === 'gainage') return '3×10-20s';
  if(['prophylaxie_epaule','prophylaxie_genou_pied','prophylaxie_poignet'].includes(ex.category)) return '2-3×10-15';
  if(ex.category === 'haut_iso_volume') return '3×10-15';
  if(ex.category === 'alactique_finisher') return '3-4×8s récup complète';
  return '3×8-10';
}
function moteurDefaultRpe(ex){
  if(['bas_force','haut_force'].includes(ex.category)) return '6-7';
  return null;
}

// Cherche le log le plus récent (aujourd'hui compris) où cet exercice a été renseigné.
function moteurLastExerciseLog(exId){
  const key = moteurExKey(exId);
  const todayEntry = getLog()[key];
  if(todayEntry) return {date: todayStr, entry: todayEntry};
  const dayKeys = Object.keys(localStorage).filter(k=>k.startsWith('log:')).sort().reverse();
  for(const dk of dayKeys){
    let l; try{ l = JSON.parse(localStorage.getItem(dk)); }catch(e){ continue; }
    if(l && l[key]) return {date: dk.slice(4), entry: l[key]};
  }
  return null;
}

function moteurGetCharge(exId){
  const last = moteurLastExerciseLog(exId);
  if(last && last.entry.charge != null && last.entry.charge !== '' &&
     (last.date === todayStr || moteurDaysAgo(last.date) <= 10)) return last.entry.charge;
  if(M_CHARGE_SEED[exId]) return M_CHARGE_SEED[exId].load;
  return null;
}

function moteurLastPastLog(exId){

  const dayKeys = Object.keys(localStorage).filter(k=>k.startsWith('log:') && k.slice(4)!==todayStr).sort().reverse();
  for(const dk of dayKeys){

function moteurRpeToApproxRIR(rpe){

  const last = moteurLastExerciseLog(exId);
  if(!ex || !last || last.entry.rpe == null || last.entry.rpe === '') return null;
  // Une donnée trop ancienne ne sert pas à valider un poids aujourd'hui — seulement informatif
  // au-delà de 10 jours (le corps a pu changer, mieux vaut resaisir un RPE frais avant de suggérer).
  if(last.date !== todayStr && moteurDaysAgo(last.date) > 10) return null;
  const rir = moteurRpeToApproxRIR(last.entry.rpe);
  if(rir == null) return null;
  if(ex.progression_type === 'barre'){
    const step = ex.category === 'bas_force' ? 3 : 1.5;
    if(rir >= 3) return {action:'augmenter', text:'+'+step+' kg conseillé (RPE '+last.entry.rpe+' → marge élevée)'};
    if(rir === 2) return {action:'maintenir_ou_leger', text:'Maintenir ou +'+(step/2)+' kg'};
    if(rir === 1) return {action:'maintenir', text:'Conserver la charge (proche du max)'};
    return {action:'reduire', text:'Réduire légèrement ou répéter la séance (RPE '+last.entry.rpe+')'};
  }
  if(ex.progression_type === 'halteres_kb'){
    if(rir >= 3) return {action:'augmenter', text:'Palier disponible le plus proche (ou changement de KB)'};
    if(rir === 2) return {action:'maintenir_ou_leger', text:'Maintenir, palier suivant si séance très propre'};
    if(rir === 1) return {action:'maintenir', text:'Conserver la charge/le KB actuel'};
    return {action:'reduire', text:'Revenir au palier/KB précédent'};
  }
  if(ex.progression_type === 'isometrie'){
    if(rir >= 3) return {action:'augmenter', text:'+2-5s de tenue'};
    return {action:'maintenir', text:'Maintenir la durée'};
  }
  return null;
}
function moteurApplyProgression(exId){
  const ex = M_EX_BY_ID[exId];
  const sugg = moteurProgressionSuggestion(exId);
  if(!sugg || ex.progression_type !== 'barre') return;
  const cur = Number(moteurGetCharge(exId)) || 0;
  const step = ex.category === 'bas_force' ? 3 : 1.5;
  let next = cur;
  if(sugg.action === 'augmenter') next = cur + step;
  else if(sugg.action === 'maintenir_ou_leger') next = cur + step/2;
  else if(sugg.action === 'reduire') next = Math.max(0, cur - step/2);
  moteurSetTodayField(exId, 'charge', Math.round(next*2)/2);
}

function moteurExerciseStatus(exId){
  const ex = M_EX_BY_ID[exId];
  if(!ex) return {ok:false, reason:'Exercice introuvable'};
  const avail = moteurEquipment();
  const missing = ex.equipment_required.filter(r => !avail.includes(r));
  if(missing.length) return {ok:false, reason:'Matériel manquant : ' + missing.map(m=>M_EQUIP_LABEL[m]||m).join(', ')};
  const sev = moteurSeverityFromBilan();
  for(const c of (ex.contraindications||[])){
    if(c === 'epaule_G'){
      if(ex.delestage_tier != null && ex.delestage_tier <= MS.delestageEpauleTier){
        return {ok:false, reason:'Délestage épaule G actif (étage ' + ex.delestage_tier + ' coupé)'};
      }
    } else {
      const threshold = (ex.severity_overrides && ex.severity_overrides[c] != null) ? ex.severity_overrides[c] : 1;
      if((sev[c]||0) >= threshold){
        return {ok:false, reason:'Contre-indication active (' + (sev[c]>=2?'forte':'légère') + ') : ' + (M_CONTRA_LABEL[c]||c)};
      }
    }
  }
  return {ok:true, reason:null};
}

// Résolution d'un slot : préférence déclarée -> substituts déclarés -> repli par PATTERN
// (même mouvement fonctionnel) -> repli par simple catégorie/qualité en dernier recours.
function moteurResolveSlot(slot, usedIds){
  const pref = slot.exercice_pref;
  const prefEx = pref ? M_EX_BY_ID[pref] : null;
  const wantedQualities = slot.qualities || (prefEx ? prefEx.qualities : []) || [];
  const wantedPattern = prefEx ? prefEx.pattern : null;

  function tryFind(predicateExtra){
    return MCAT.exercises.find(e => !usedIds.has(e.id) && predicateExtra(e) && moteurExerciseStatus(e.id).ok);
  }
  function fallback(excludeId){
    if(wantedPattern && wantedPattern !== 'none'){
      const byPattern = tryFind(e => e.id !== excludeId && e.pattern === wantedPattern);
      if(byPattern) return {ex: byPattern, viaPattern:true};
    }
    const byCategory = tryFind(e => e.id !== excludeId && e.category === slot.category &&
      (!wantedQualities.length || wantedQualities.some(q => e.qualities.includes(q))));
    if(byCategory) return {ex: byCategory, viaPattern:false};
    return null;
  }

  if(pref){
    const st = moteurExerciseStatus(pref);
    if(st.ok && !usedIds.has(pref)) return {exId: pref, substituted:false};
    if(prefEx && prefEx.substitutes){
      for(const subId of Object.values(prefEx.substitutes)){
        const subSt = moteurExerciseStatus(subId);
        if(subSt.ok && !usedIds.has(subId)) return {exId: subId, substituted:true, from: pref, blockedReason: st.reason};
      }
    }
    const alt = fallback(pref);
    if(alt) return {exId: alt.ex.id, substituted:true, from: pref, blockedReason: st.reason, viaPattern: alt.viaPattern};
    return {exId: null, blocked:true, blockedReason: st.reason || 'Aucun substitut disponible'};
  }
  const alt = fallback(null);
  if(alt) return {exId: alt.ex.id, substituted:false};
  return {exId: null, blocked:true, blockedReason: 'Aucun exercice disponible dans cette catégorie'};
}
function moteurResolveSession(session){
  const usedIds = new Set();
  const results = [];
  session.slots.forEach(slot=>{
    const r = Object.assign({slot}, moteurResolveSlot(slot, usedIds));
    if(r.exId) usedIds.add(r.exId);
    results.push(r);
  });
  const oblFails = results.filter(r => r.slot.obligatoire && r.blocked);
  const optFails = results.filter(r => !r.slot.obligatoire && r.blocked);
  let status = 'ok';
  if(oblFails.length) status = 'blocked';
  else if(optFails.length || results.some(r=>r.substituted)) status = 'partial';
  return {results, status, oblFails, optFails};
}
function moteurSessionLockedByPhase(session){
  if(session.semaine_classique) return false;
  return !moteurBlocQualiteActive();
}

function _initAudio(){
  try{

    if(_audioCtx.state==='suspended') _audioCtx.resume();
  }catch(e){}
}

function parseReposAll(r){
  if(!r||r==='\u2014'||r==='-') return [];
  const out=[];
  // Split on / but keep "4-5 min/paire" as one (no sec before /)
  const parts = r.split('/');
  for(const part of parts){
    const mm=part.match(/(\d+)(?:-(\d+))?\s*min/);
    if(mm){const v=mm[2]?parseInt(mm[2]):parseInt(mm[1]);out.push({sec:v*60,lbl:v+'min'});continue;}
    const ss=part.match(/(\d+)(?:-(\d+))?s(?!\w)/);
    if(ss){const v=ss[2]?parseInt(ss[2]):parseInt(ss[1]);out.push({sec:v,lbl:v+'s'});}
  }
  // Deduplicate by sec value, keep unique
  return out.filter((t,i,a)=>a.findIndex(x=>x.sec===t.sec)===i).filter(t=>t.sec>0);
}

function _beep(freq,dur){
  try{
    if(!_audioCtx) return;
    if(_audioCtx.state==='suspended') _audioCtx.resume();
    const o=_audioCtx.createOscillator(),g=_audioCtx.createGain();
    o.type='square';
    o.connect(g);g.connect(_audioCtx.destination);
    o.frequency.value=freq;
    g.gain.setValueAtTime(1.0,_audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,_audioCtx.currentTime+dur);
    o.start(_audioCtx.currentTime);o.stop(_audioCtx.currentTime+dur+0.05);
  }catch(e){}
}


function _speak(txt){
  try{
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(txt);
    u.lang='fr-FR';u.rate=1.1;u.volume=1;u.pitch=1;
    window.speechSynthesis.speak(u);
  }catch(e){}
}

function _bell(){
  try{
    if(!_audioCtx)return;
    if(_audioCtx.state==='suspended')_audioCtx.resume();
    const t=_audioCtx.currentTime;
    [[880,1.0,2.5],[1320,0.5,1.8],[2200,0.25,1.2],[440,0.3,2.0]].forEach(([freq,gain,decay])=>{
      const o=_audioCtx.createOscillator(),g=_audioCtx.createGain();
      o.type='sine';o.connect(g);g.connect(_audioCtx.destination);
      o.frequency.value=freq;
      g.gain.setValueAtTime(gain,t);
      g.gain.exponentialRampToValueAtTime(0.001,t+decay);
      o.start(t);o.stop(t+decay+0.05);
    });
  }catch(e){}
}

function getRecentLogs(days){

    const ds=d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');
    out.push({date:ds,log:load('log:'+ds)||{}});

  // ── HRV ──────────────────────────────────────────────────────────────────
  const hrv7=L7.map(d=>Number(d.log.matin?.hrv)).filter(v=>v>0);

  if(hrv7.length>=3&&hrv14.length>=5){
    const base=hrv14.reduce((a,b)=>a+b,0)/hrv14.length;
    const rec=hrv7.slice(0,3).reduce((a,b)=>a+b,0)/Math.min(3,hrv7.length);
    const drop=(base-rec)/base;
    if(drop>0.2)
      flags.push({lvl:'red',icon:'❤️',metric:`HRV -${Math.round(drop*100)}% vs baseline`,msg:'Chute HRV significative. SNC sous tension. Priorité récupération : réduire intensité, pas volume.'});
    else if(drop>0.1)
      flags.push({lvl:'orange',icon:'⚠️',metric:`HRV -${Math.round(drop*100)}% vs baseline`,msg:'Tendance baissière HRV. Éviter les surcharges cette semaine.'});
  }

  // ── Sommeil ───────────────────────────────────────────────────────────────
  const sq3=L7.slice(0,3).map(d=>d.log.matin?.sleep_quality).filter(v=>v);
  if(sq3.length>=2&&sq3.filter(v=>v<=2).length>=2)
    flags.push({lvl:'red',icon:'😴',metric:'Sommeil dégradé (≤2/5 sur 2+ nuits)',msg:'Récupération insuffisante. Couper la séance la plus intense cette semaine.'});
  else if(sq3.length>=3&&sq3.reduce((a,b)=>a+b,0)/sq3.length<3)
    flags.push({lvl:'orange',icon:'⚠️',metric:`Qualité sommeil moy. ${(sq3.reduce((a,b)=>a+b,0)/sq3.length).toFixed(1)}/5`,msg:'Réduire le volume de 15% et prioriser le protocole cohérence cardiaque soir.'});

  // ── BOLT ─────────────────────────────────────────────────────────────────
  const bolt7=L7.map(d=>Number(d.log.matin?.bolt)).filter(v=>v>0);
  if(bolt7.length>=3){
    const trend=bolt7[0]-bolt7[bolt7.length-1];
    if(trend<-4)
      flags.push({lvl:'orange',icon:'🫁',metric:`BOLT -${Math.abs(Math.round(trend))}s cette semaine`,msg:'Régression BOLT. Augmenter cohérence cardiaque + humming. Vérifier respiration nasale pendant AGT.'});
  }

  // ── ACWR (Gabbett) ────────────────────────────────────────────────────────
  const acute=L7.reduce((s,d)=>s+(Number(d.log.soir?.rpe)||0),0);
  const chronic4w=L28.reduce((s,d)=>s+(Number(d.log.soir?.rpe)||0),0)/4;
  if(acute>0&&chronic4w>0){
    const acwr=acute/chronic4w;
    if(acwr>1.5)
      flags.push({lvl:'red',icon:'📈',metric:`ACWR ${acwr.toFixed(2)} · zone rouge`,msg:'Risque blessure élevé (Gabbett >1.5). Déload obligatoire cette semaine.'});
    else if(acwr>1.3)
      flags.push({lvl:'orange',icon:'⚠️',metric:`ACWR ${acwr.toFixed(2)} · attention`,msg:'Au-dessus du seuil optimal (0.8-1.3). Pas de surcharge. Maintenir les charges actuelles.'});
  }

  // ── SÉANCE COMPRESSÉE (jour rouge) ─────────────────────────────────────────
  // Déclencheurs : sommeil <6h OU HRV -10% OU douleur >= modérée (légère persistante ou forte)
  const todayLog = L7[0] ? L7[0].log : {};
  const tm = todayLog.matin || {};
  const sleepLow = tm.sleep_hours!==undefined && tm.sleep_hours!=='' && Number(tm.sleep_hours) < 6;
  let hrvDrop10 = false;
  if(hrv7.length>=3 && hrv14.length>=5){
    const base=hrv14.reduce((a,b)=>a+b,0)/hrv14.length;
    const rec=hrv7.slice(0,3).reduce((a,b)=>a+b,0)/Math.min(3,hrv7.length);
    if((base-rec)/base > 0.1) hrvDrop10 = true;
  }
  const painMod = (tm.douleur_genou==='forte'||tm.douleur_genou==='légère'||tm.douleur_poignet==='forte'||tm.douleur_epaule==='forte'||tm.douleur_epaule==='légère');
  if(sleepLow || hrvDrop10 || painMod){
    const raisons=[];
    if(sleepLow) raisons.push('sommeil <6h');
    if(hrvDrop10) raisons.push('HRV -10%');
    if(painMod) raisons.push('douleur ≥ modérée');
    flags.unshift({lvl:'orange',icon:'🗜️',metric:'Jour compressé conseillé ('+raisons.join(' · ')+')',msg:'Signaux de récupération basse. La séance COMPRESSÉE du jour (version allégée) est disponible en 1 tap dans l\'onglet Séance. Garde le mouvement, réduis le volume/l\'intensité — ne saute pas, allège.',compressed:true});
  }

  return flags;
}

function getAllExerciseData(){
  // Scan all localStorage logs, collect {exName: [{date, charge, rpe}]}
  const data = {};
  for(let i=0;i<localStorage.length;i++){
    const k = localStorage.key(i);
    if(!k || !k.startsWith('log:')) continue;
    const dateStr = k.substring(4);
    let log;
    try{ log = JSON.parse(localStorage.getItem(k)); }catch(e){ continue; }
    if(!log) continue;
    Object.keys(log).forEach(key=>{
      if(!key.startsWith('ex_')) return;
      const entry = log[key];
      if(!entry || (!entry.charge && !entry.rpe)) return;

      let baseName, blocId, fmtVal;
      const mMoteur = key.match(/^ex_moteur_(.+)$/);
      if(mMoteur){
        // Nouveau moteur (post-Guyane) : clé = ex_moteur_<exerciceId du catalogue>
        const exObj = (typeof M_EX_BY_ID_NAME!=='undefined') ? M_EX_BY_ID_NAME[mMoteur[1]] : null;
        baseName = exObj || mMoteur[1];
        blocId = 0; fmtVal = entry.fmt||'';
      } else {
        // Ancien format Guyane : ex_<seance>_b<bloc>_<idx>
        const m = key.match(/^ex_(.+)_b(\d)_(\d+)(?:_\w+)?$/);
        if(!m) return;
        const seanceName=m[1], blocNum=Number(m[2]), exIdx=Number(m[3]);
        const seance=SEANCES[seanceName];
        if(!seance||!seance.blocs||!seance.blocs[blocNum]) return;
        const exList=seance.blocs[blocNum].exercices||[];
        const ex=exList[exIdx];
        if(!ex) return;
        baseName=ex.name.replace(/[\u2605\u26a1\u26a0]/g,'').replace(/\s+/g,' ').trim().split('\u00b7')[0].trim();
        blocId = blocNum; fmtVal = ex.fmt||'';
      }
      // Canonicalisation : fusionner les variantes du même exercice (noms changés entre blocs, et entre
      // l'ancien système Guyane et le nouveau moteur — mêmes mouvements, même bucket de stats)
      const _canon=[
        [/militaire/i,'Militaire'],
        [/db bench inclin/i,'DB Bench incliné'],
        [/bench plat/i,'Bench plat'],
        [/db press vertical/i,'DB Press vertical'],
        [/pendlay/i,'Pendlay Row'],
        [/gorilla/i,'Gorilla Row'],
        [/chin-ups|pull-up/i,'Chin-ups'],
        [/romanian|^rdl|\brdl\b/i,'RDL'],
        [/zercher/i,'Zercher'],
        [/copenhagen/i,'Copenhagen'],
        [/bulgarian/i,'Bulgarian'],
        [/nordic/i,'Nordic Curl'],
        [/pallof/i,'Pallof'],
        [/face pull/i,'Face Pull'],
        [/rotation ext/i,'Rotation externe'],
        [/nuque/i,'Nuque ISO'],
        [/farmer carry/i,'Farmer carry'],
        [/alactique|kb swing/i,'Alactique KB'],
        [/dragon flag/i,'Dragon flag'],
        [/back extension/i,'Back extension'],
      ];
      for(const [re,name] of _canon){ if(re.test(baseName)){ baseName=name; break; } }
      if(!data[baseName]) data[baseName]=[];
      const chargeNum=(()=>{
        if(typeof entry.charge === 'number') return entry.charge;
        let raw=String(entry.charge||'').replace(',','.').trim();
        if(!raw) return null;
        // Format "NxM" ou "Nx M kg" → prendre M (la charge par main), pas N (le nombre)
        let mx=raw.match(/(\d+(?:\.\d+)?)\s*[x\u00d7]\s*(\d+(?:\.\d+)?)/i);
        if(mx) return parseFloat(mx[2]);
        // Format "PDC+Nkg" → prendre N (le lest)
        let mp=raw.match(/(?:PDC|pdc)\s*\+\s*(\d+(?:\.\d+)?)/);
        if(mp) return parseFloat(mp[1]);
        // Sinon premier nombre
        let m1=raw.match(/(\d+(?:\.\d+)?)/);
        return m1?parseFloat(m1[1]):null;
      })();
      if(chargeNum===null||isNaN(chargeNum)) return; // skip if no charge entered
      data[baseName].push({date:dateStr, charge:chargeNum, chargeRaw: entry.charge!=null?String(entry.charge):'', rpe:Number(entry.rpe)||null, fmt:fmtVal, bloc:blocId});
    });
  }
  // Sort each by date
  Object.values(data).forEach(arr=>arr.sort((a,b)=>a.date.localeCompare(b.date)));
  return data;
}

function renderStats(){
  const el = $('div',{style:{width:'100%',minWidth:'100%',display:'flex',flexDirection:'column',alignItems:'stretch',boxSizing:'border-box'}});
  const data = getAllExerciseData();
  const exNames = Object.keys(data).filter(n=>data[n].some(d=>d.charge!==null));

  const card = $('div',{class:'card'});
  card.appendChild($('div',{class:'card-title'},'📈 Progression des charges'));

  if(exNames.length===0){
    card.appendChild($('div',{style:{fontSize:'12px',color:'#475569',lineHeight:'1.6'}},
      'Aucune donnée encore. Saisis la charge utilisée sur les cards d\'exercices pendant tes séances — les courbes apparaîtront ici automatiquement.'));
    el.appendChild(card);
    return el;
  }

  if(!_statsEx || !exNames.includes(_statsEx)) _statsEx = exNames[0];

  // Exercise selector chips
  const selRow = $('div',{style:{display:'flex',gap:'6px',flexWrap:'wrap',marginBottom:'14px'}});
  exNames.forEach(n=>{
    selRow.appendChild($('button',{
      style:{
        padding:'6px 10px',borderRadius:'8px',fontSize:'11px',fontWeight:'600',cursor:'pointer',
        border:'1.5px solid '+(n===_statsEx?'#3b82f6':'#1e2d42'),
        background:n===_statsEx?'#1a2942':'#111d2e',
        color:n===_statsEx?'#3b82f6':'#94a3b8'
      },
      onclick:()=>{ _statsEx=n; render(); }
    }, n.length>22?n.substring(0,22)+'…':n));
  });
  card.appendChild(selRow);

  // Build SVG chart
  const pts = data[_statsEx].filter(d=>d.charge!==null);
  if(pts.length===0){
    card.appendChild($('div',{style:{fontSize:'12px',color:'#475569'}},'Pas de charge numérique saisie pour cet exercice.'));
  } else {
    const W=320,H=180,P={t:14,r:14,b:28,l:34};
    const vals=pts.map(p=>p.charge);
    let vMin=Math.min(...vals), vMax=Math.max(...vals);
    if(vMin===vMax){ vMin-=2; vMax+=2; }
    const pad=(vMax-vMin)*0.12; vMin-=pad; vMax+=pad;
    const x=i=>P.l+(pts.length===1?((W-P.l-P.r)/2):(i*(W-P.l-P.r)/(pts.length-1)));
    const y=v=>P.t+(H-P.t-P.b)*(1-(v-vMin)/(vMax-vMin));

    let svg='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;display:block">';
    // Grid lines (3)
    for(let g=0;g<=3;g++){
      const gv=vMin+(vMax-vMin)*g/3, gy=y(gv);
      svg+='<line x1="'+P.l+'" y1="'+gy+'" x2="'+(W-P.r)+'" y2="'+gy+'" stroke="#1e2d42" stroke-width="1"/>';
      svg+='<text x="'+(P.l-5)+'" y="'+(gy+3)+'" fill="#475569" font-size="9" text-anchor="end">'+gv.toFixed(0)+'</text>';
    }
    // Line path
    if(pts.length>1){
      let path='M';
      pts.forEach((p,i)=>{ path+=(i?' L':'')+x(i).toFixed(1)+' '+y(p.charge).toFixed(1); });
      svg+='<path d="'+path+'" fill="none" stroke="#3b82f6" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>';
    }
    // Bloc change separators (vertical dashed lines)
    for(let i=1;i<pts.length;i++){
      if(pts[i].bloc!==pts[i-1].bloc){
        const sx=(x(i)+x(i-1))/2;
        svg+='<line x1="'+sx.toFixed(1)+'" y1="'+P.t+'" x2="'+sx.toFixed(1)+'" y2="'+(H-P.b)+'" stroke="#475569" stroke-width="1" stroke-dasharray="3,3"/>';
        svg+='<text x="'+(sx+3).toFixed(1)+'" y="'+(P.t+8)+'" fill="#475569" font-size="8">B'+pts[i].bloc+'</text>';
      }
    }
    // Points + RPE color
    pts.forEach((p,i)=>{
      const col=p.rpe?(p.rpe>=9?'#e63946':p.rpe>=7?'#f5a623':'#10b981'):'#3b82f6';
      svg+='<circle cx="'+x(i).toFixed(1)+'" cy="'+y(p.charge).toFixed(1)+'" r="4.5" fill="'+col+'" stroke="#0a0f1a" stroke-width="1.5"/>';
      // Date labels (max 6, evenly spread)
      if(pts.length<=6 || i%Math.ceil(pts.length/6)===0 || i===pts.length-1){
        const d=p.date.substring(5).replace('-','/');
        svg+='<text x="'+x(i).toFixed(1)+'" y="'+(H-8)+'" fill="#475569" font-size="8.5" text-anchor="middle">'+d+'</text>';
      }
    });
    svg+='</svg>';

    const chartWrap=$('div',{style:{background:'#0d1525',borderRadius:'10px',padding:'10px 6px 4px'}});
    chartWrap.innerHTML=svg;
    card.appendChild(chartWrap);

    // Legend + summary
    const first=pts[0].charge, last=pts[pts.length-1].charge;
    const delta=last-first;
    const sum=$('div',{style:{display:'flex',gap:'12px',marginTop:'10px',flexWrap:'wrap'}});
    sum.appendChild($('div',{style:{fontSize:'11px',color:'#94a3b8'}},'Début: '+first+' kg'));
    sum.appendChild($('div',{style:{fontSize:'11px',color:'#94a3b8'}},'Actuel: '+last+' kg'));
    sum.appendChild($('div',{style:{fontSize:'11px',fontWeight:'700',color:delta>=0?'#10b981':'#e63946'}},
      (delta>=0?'+':'')+delta.toFixed(1)+' kg ('+(first?((delta/first*100).toFixed(0)):'—')+'%)'));
    card.appendChild(sum);
    card.appendChild($('div',{style:{fontSize:'10px',color:'#475569',marginTop:'8px'}},
      'Points = charge réellement saisie. 🟢 RPE ≤6 · 🟠 7-8 · 🔴 ≥9. ⚠ Comparer uniquement dans le même bloc — format et tempo changent entre blocs.'));

    // Data table: last entries with format
    const tbl=$('div',{style:{marginTop:'12px'}});
    tbl.appendChild($('div',{style:{fontSize:'11px',fontWeight:'700',color:'#94a3b8',marginBottom:'6px'}},'Dernières séances'));
    pts.slice(-8).reverse().forEach(p=>{
      const row=$('div',{style:{display:'flex',gap:'8px',alignItems:'center',padding:'5px 8px',background:'#0d1525',borderRadius:'6px',marginBottom:'4px',fontSize:'11px'}});
      row.appendChild($('span',{style:{color:'#475569',minWidth:'42px'}},p.date.substring(5).replace('-','/')));
      row.appendChild($('span',{style:{color:'#f0f4ff',fontWeight:'700',minWidth:'52px'}},p.chargeRaw||p.charge+' kg'));
      row.appendChild($('span',{style:{color:'#8b5cf6',flex:'1'}},p.fmt||'B'+p.bloc));
      row.appendChild($('span',{style:{color:'#475569',fontSize:'10px'}},'B'+p.bloc));
      if(p.rpe)row.appendChild($('span',{style:{color:p.rpe>=9?'#e63946':p.rpe>=7?'#f5a623':'#10b981',fontWeight:'700'}},'RPE '+p.rpe));
      tbl.appendChild(row);
    });
    card.appendChild(tbl);
  }

  el.appendChild(card);
  return el;
}

// Construit les cartes d'exercice de la séance sélectionnée, directement dans `el` (pas de page séparée).
function renderSessionCards(el, session){

  el.appendChild($('div',{class:'section-hdr'},'🏋️ '+session.nom));

  // Focus / cycle actif
  const cyc = moteurCycleInfo();
  if(cyc){
    el.appendChild($('div',{class:'card',style:{paddingTop:'10px',paddingBottom:'10px'}},
      $('span',{class:'tag tag-purple'},'🔁 '+cyc.typeLabel),

    ));
  } else {
    el.appendChild($('div',{class:'card',style:{paddingTop:'10px',paddingBottom:'10px',fontSize:'11.5px',color:'#64748b'}},session.objectif||''));
  }

  const res = moteurResolveSession(session);

  // Bandeau séance compressée — même détection que Guyane (sommeil/HRV/douleur), même présentation.
  try {
    const flags = computeFlags();
    const compFlag = flags.find(f=>f.compressed);
    if(compFlag){
      const guyaneKey = M_GUYANE_SESSION_KEY[session.id];
      const compData = guyaneKey ? COMPRESSED_SESSIONS[guyaneKey] : null;
      const banner = $('div',{class:'card',style:{borderColor:'#e67e22',background:'#2a1f14'}});
      banner.appendChild($('div',{class:'card-title',style:{color:'#e67e22'}},'🗜️ '+compFlag.metric));
      banner.appendChild($('div',{style:{fontSize:'12px',color:'#c9a06a',marginBottom:'8px'}},'Signaux de récupération basse. Version allégée du jour (garde le mouvement, réduis le volume) :'));
      if(compData){
        const ul=$('div',{style:{fontSize:'13px',lineHeight:'1.7'}});
        compData.forEach(x=>ul.appendChild($('div',{},'• '+x)));
        banner.appendChild(ul);
      } else {
        banner.appendChild($('div',{style:{fontSize:'12px',color:'#8a94a6'}},'Réduis le volume de ~40% et l\'intensité, garde les patterns principaux.'));
      }
      banner.appendChild($('div',{style:{fontSize:'11px',color:'#8a94a6',marginTop:'8px',fontStyle:'italic'}},'Ne saute pas la séance — allège-la. Le mouvement aide la récupération.'));
      el.appendChild(banner);
    }
  } catch(e){}

  // Priming minimaliste — même présentation qu'avant (une ligne compacte), pas de carte complète.
  const primingList = moteurFindGuyanePriming(session);
  if(primingList && primingList.length){
    el.appendChild($('div',{class:'card',style:{paddingTop:'8px',paddingBottom:'8px',fontSize:'11.5px',color:'#94a3b8'}},
      $('span',{style:{color:'#f5a623',fontWeight:700}},'Priming : '),
      primingList.join(' · ')
    ));
  }
  const MINIMAL_ROLES = new Set(['cars_echauffement','primer_alactique']);

  res.results.forEach(r=>{
    const slot = r.slot;
    if(MINIMAL_ROLES.has(slot.role)) return; // couvert par la ligne de priming ci-dessus
    if(!r.exId){
      el.appendChild($('div',{class:'card',style:{borderColor:'#e63946'}},
        $('div',{style:{fontSize:'10px',textTransform:'uppercase',color:'#475569',letterSpacing:'.4px',marginBottom:'4px'}},slot.role.replace(/_/g,' ')),
        $('div',{style:{fontSize:'13px',fontWeight:600,color:'#ff8087'}},'⚠ Indisponible — '+(r.blockedReason||''))
      ));
      return;
    }
    const ex = M_EX_BY_ID[r.exId];
    const proto = moteurProtocolFor(ex);
    const guyaneRef = moteurFindGuyaneRef(ex.id);
    const exKey = moteurExKey(ex.id);
    const exLog = getLog()[exKey] || {sets:{}};
    const tooltipNote = (guyaneRef && guyaneRef.note) || ex.note || '';

    const card = $('div',{class:'ex-card'});
    const hdr = $('div',{class:'ex-header'});
    hdr.appendChild($('span',{class:'ex-num'},'●'));
    hdr.appendChild($('span',{class:'ex-name'}, ex.name));
    if(r.substituted) hdr.appendChild($('span',{class:'tag tag-purple',style:{fontSize:'9px'}},r.viaPattern?'même pattern':'substitué'));
    if(tooltipNote) hdr.appendChild($('button',{class:'info-btn',onclick:(e)=>{ e.stopPropagation(); showTooltip(e, tooltipNote); }},'?'));
    card.appendChild(hdr);
    card.appendChild($('div',{style:{fontSize:'9.5px',textTransform:'uppercase',color:'#475569',letterSpacing:'.4px',marginTop:'-4px',marginBottom:'6px'}},
      slot.role.replace(/_/g,' ')+(slot.obligatoire?'':' (optionnel)')));
    if(r.substituted && r.from) card.appendChild($('div',{style:{fontSize:'10.5px',color:'#64748b',marginBottom:'4px'}},'Remplace : '+(M_EX_BY_ID_NAME[r.from]||r.from)));
    if(slot.note) card.appendChild($('div',{style:{fontSize:'10.5px',color:'#64748b',marginBottom:'6px'}},slot.note));

    // Grid infos (format / repos / tempo / RPE cible) — priorité: protocole de cycle > format standard Guyane
    const format = proto ? proto.format : ((guyaneRef && guyaneRef.fmt) ? guyaneRef.fmt : moteurDefaultFormat(ex));
    const rpeCible = proto ? proto.rpe : ((guyaneRef && guyaneRef.rpe) || moteurDefaultRpe(ex) || null);
    const tempoSource = ((guyaneRef && guyaneRef.note)||'') + ' ' + ((guyaneRef && guyaneRef.fmt)||'') + ' ' + (format||'');
    const tempoMatch = tempoSource.match(/[Tt]empo\s+([0-9X]-[0-9X]-[0-9X]-[0-9X])/);
    const grid = $('div',{class:'ex-grid'});
    grid.appendChild($('div',{class:'ex-cell'},
      $('div',{class:'ex-cell-lbl'},'Format'),
      $('div',{class:'ex-cell-val purple'}, format || '—')
    ));
    const NO_REPOS_CATEGORIES = new Set(['cars_mobilite','respiration','test']);
    const rTimers = (guyaneRef && guyaneRef.repos) ? parseReposAll(guyaneRef.repos) : [{sec:90,lbl:'90s'},{sec:120,lbl:'2 min'}];
    if(!NO_REPOS_CATEGORIES.has(ex.category)){
      const reposCell = $('div',{class:'ex-cell'});
      reposCell.appendChild($('div',{class:'ex-cell-lbl'},'Repos'));
      if(rTimers.length){
        const btnWrap = $('div',{class:'timer-btns'});
        rTimers.forEach(t=>btnWrap.appendChild($('button',{class:'timer-btn',onclick:(e)=>{ e.stopPropagation(); startTimer(t.sec, ex.name); }},'⏱ '+t.lbl)));
        reposCell.appendChild(btnWrap);
      } else {
        reposCell.appendChild($('div',{class:'ex-cell-val red'},guyaneRef.repos));
      }
      grid.appendChild(reposCell);
    }
    if(tempoMatch) grid.appendChild($('div',{class:'ex-cell'},
      $('div',{class:'ex-cell-lbl'},'Tempo'),
      $('div',{class:'ex-cell-val teal'}, tempoMatch[1])
    ));
    if(rpeCible) grid.appendChild($('div',{class:'ex-cell'},
      $('div',{class:'ex-cell-lbl'},'RPE cible'),
      $('div',{class:'ex-cell-val gold'}, rpeCible)
    ));
    card.appendChild(grid);

    if(ex.progression_type !== 'aucun'){
      // Repère "dernière fois" si l'exercice n'a pas été refait depuis un moment
      const pastLog = moteurLastPastLog(ex.id);
      if(pastLog && !exLog.charge){
        const daysAgo = moteurDaysAgo(pastLog.date);
        const [y,mo,da] = pastLog.date.split('-');
        card.appendChild($('div',{style:{fontSize:'10.5px',color:'#f5a623',marginBottom:'6px'}},
          '📌 Dernière fois : '+pastLog.entry.charge+' '+moteurGetChargeUnit(ex.id)+
          (pastLog.entry.rpe?' · RPE '+pastLog.entry.rpe:'')+' — le '+da+'/'+mo+'/'+y+' (il y a '+daysAgo+' j)'));
      }

      // Charge + RPE réel (mêmes champs que le reste de l'app — pas de doublon RIR)
      const unit = moteurGetChargeUnit(ex.id);
      const seedOrLast = moteurGetCharge(ex.id);
      const chargeRow = $('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px',background:'#0d1525',borderRadius:'7px',padding:'7px 8px',flexWrap:'wrap'}});
      if(ex.progression_type !== 'isometrie'){
        chargeRow.appendChild($('span',{style:{fontSize:'11px',color:'#475569'}},'Charge ('+unit+'):'));
        chargeRow.appendChild($('input',{class:'input-mod',type:'number',step:'0.5',
          value: exLog.charge!=null?exLog.charge:'', placeholder: seedOrLast!=null?String(seedOrLast):'—',
          onchange:(e)=>{ moteurSetTodayField(ex.id,'charge', e.target.value===''?null:Number(e.target.value)); moteurSetTodayField(ex.id,'fmt', format||''); render(); }
        }));
      }
      chargeRow.appendChild($('span',{style:{fontSize:'11px',color:'#475569'}},'RPE réel:'));
      chargeRow.appendChild($('input',{class:'input-mod',type:'number',min:'1',max:'10',
        value: exLog.rpe||'', placeholder:'—',
        onchange:(e)=>{ moteurSetTodayField(ex.id,'rpe', e.target.value); moteurSetTodayField(ex.id,'fmt', format||''); render(); }
      }));
      card.appendChild(chargeRow);

      const sugg = moteurProgressionSuggestion(ex.id);
      if(sugg){
        const suggRow = $('div',{style:{display:'flex',alignItems:'center',gap:'6px',marginBottom:'8px',flexWrap:'wrap'}},
          $('span',{style:{fontSize:'10.5px',color:'#3b82f6'}},'→ '+sugg.text)
        );
        if(ex.progression_type === 'barre'){
          suggRow.appendChild($('button',{class:'btn btn-ghost btn-sm',style:{fontSize:'9.5px',padding:'3px 8px'},
            onclick:()=>moteurApplyProgression(ex.id)},'Appliquer'));
        }
        card.appendChild(suggRow);
      }
    }

    // Sets à cocher
    card.appendChild($('div',{style:{fontSize:'10px',color:'#475569',marginBottom:'5px',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.4px'}},'Séries effectuées:'));
    const setsRow = $('div',{class:'sets-row'});
    const fmtDigits = format ? parseInt(format) : null;
    const maxSets = Math.max(2, Math.min(6, fmtDigits || 3));
    for(let s=1; s<=maxSets; s++){
      const isDone = exLog.sets && exLog.sets[s];
      setsRow.appendChild($('div',{
        class:'set-chip'+(isDone?' done':''),
        onclick:()=>{
          const l = getLog(); const e2 = l[exKey] || {sets:{}};
          e2.sets = e2.sets || {};
          const wasDone = e2.sets[s];
          e2.sets[s] = !wasDone;
          l[exKey] = e2; saveLog(l); render();
          if(!wasDone && rTimers.length>0){
            setTimeout(()=>startTimer(rTimers[0].sec, ex.name), 500);
          }
        }
      }, isDone?'✓':' ', 'Set '+s));
    }
    card.appendChild(setsRow);

    // Notes perso
    const notesEl = $('textarea',{class:'textarea-field',rows:'2',placeholder:'Notes perso (optionnel)…',style:{fontSize:'11px'}});
    notesEl.value = exLog.notes||'';
    notesEl.oninput = (e)=>moteurSetTodayField(ex.id,'notes', e.target.value);
    card.appendChild(notesEl);

    el.appendChild(card);
  });

  const isDoneToday = moteurIsSessionDoneToday(session.id);
  el.appendChild($('div',{class:'card',style:{cursor:'pointer',background: isDoneToday?'#0d2b1f':undefined,borderColor: isDoneToday?'#10b981':undefined},
    onclick:()=>moteurToggleSessionDoneToday(session.id)
  },
    $('div',{class:'check-item',style:{cursor:'pointer'}},
      $('div',{class:'check-box'+(isDoneToday?' done':'')}, isDoneToday?'✓':''),
      $('div',{style:{fontWeight:700,fontSize:'13px'}},'Séance effectuée aujourd\'hui')
    )
  ));
}

    const setsCount = ex.fmt.includes('rounds')||ex.fmt.includes('R') ? 5 : (parseInt(ex.fmt)||4);

    card.appendChild(hdr);

    // Grid infos
    const _semIdx=(()=>{
      const w=S.week;
      if(w<=1) return 0;          // S1 (B1) → s1
      if(w<=4) return w-2;        // B2: S2→0(s1), S3→1(s2), S4→2(s3 pic)
      if(w===5) return 3;         // S5 → dl (déload mi-bloc)
      if(w<=8) return w-6;        // B3: S6→0(s1), S7→1(s2), S8→2(s3)
      return 3;                   // S9 → dl
    })();
    const weekVal=[ex.s1,ex.s2,ex.s3,ex.dl][_semIdx]||ex.s1;

    const tempoMatchEx=(ex.note||'').match(/Tempo\s+([0-9X]-[0-9X]-[0-9X]-[0-9X])/i);
    const cleanExName=ex.name.replace(/[\u2605\u26a0]\s*/g,'').replace(/\s*\u00b7.*$/,'').trim().substring(0,40);

    grid.appendChild($('div',{class:'ex-cell'},
      $('div',{class:'ex-cell-lbl'},'Format'),
      $('div',{class:'ex-cell-val purple'},ex.fmt),
    ));
    {
      const reposCell=$('div',{class:'ex-cell'});
      reposCell.appendChild($('div',{class:'ex-cell-lbl'},'Repos'));

      if(tempoMatchEx){

      $('div',{class:'ex-cell-val gold'},ex.rpe),

      semRow.appendChild(semEl);

      class:'input-mod',type:'number',min:'1',max:'10',

      oninput:(e)=>{ exLog.rpe=e.target.value; exLog.fmt=ex.fmt||''; log[exKey]=exLog; saveLog(log); }
    });
    chargeRow.appendChild(rpeInput);
    card.appendChild(chargeRow);

    card.appendChild($('div',{style:{fontSize:'10px',color:'#475569',marginBottom:'5px',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.4px'}},'Séries effectuées:'));

    for(let s=1; s<=maxSets; s++){
      const isDone = exLog.sets[s];
      const chip = $('div',{
        class:'set-chip'+(isDone?' done':''),
        onclick:()=>{
          const wasDone=exLog.sets[s];
          exLog.sets[s]=!exLog.sets[s];
          log[exKey]=exLog; saveLog(log);
          render(); // Update chip visually first
          if(!wasDone&&rTimers.length>0){
            const doneN=Object.values(exLog.sets).filter(Boolean).length;
            const timerCtxObj={name:cleanExName,fmt:ex.fmt,charge:weekVal&&weekVal!=='—'?weekVal:null,setNum:doneN,totalSets:setsCount,tempo:tempoMatchEx?tempoMatchEx[1]:null};
            setTimeout(()=>startTimer(rTimers[0].sec,timerCtxObj), 500);
          }
        }
      }, isDone?'✓':' ', `Set ${s}`);
      setsRow.appendChild(chip);
    }
    card.appendChild(setsRow);

    // Notes perso
    const notesEl = $('textarea',{
      class:'textarea-field',rows:'2',
      placeholder:'Notes perso (optionnel)…',
      style:{fontSize:'11px'},
    });
    notesEl.value = exLog.notes||'';
    notesEl.oninput = (e)=>{ exLog.notes=e.target.value; log[exKey]=exLog; saveLog(log); };
    card.appendChild(notesEl);

    el.appendChild(card);
  });

  // Récup respiratoire post-effort — conditioning only
  if(S.seanceKey==='Conditioning'){
  const recupCard = $('div',{class:'card'},
    $('div',{class:'card-title',style:{color:'#06b6d4'}},'🌬️ Récupération Respiratoire Post-Effort'),
    $('div',{style:{fontSize:'12px',color:'#64748b',lineHeight:'1.6'}},
      '1. Expire lente 6s bouche ouverte (vider CO₂)\n'+
      '2. 4-7-8 × 3: inhale nasal 4s → hold 7s → exhale bouche 8s\n'+
      '3. Sigh physiologique × 2: double inhale nasal court+long → exhale complète\n'+
      '4. Chrono: noter temps jusqu\'à FC <130 bpm'
    ),
    $('div',{style:{marginTop:'8px',display:'flex',alignItems:'center',gap:'8px'}},
      $('span',{style:{fontSize:'11px',color:'#475569'}},'Temps récup FC<130:'),
      $('input',{class:'input-mod',type:'text',placeholder:'ex: 1m30s',
        value:(log.recupTime||''),
        oninput:(e)=>{ updateLog('recupTime',e.target.value); }
      })
    )
  );
  el.appendChild(recupCard);
  } // end conditioning only

  return el;
}

    )
  ));

  GTG_EXERCICES.forEach(ex=>{
    const exLog = gtgLog[ex.id] || {passages:[]};
    const card = $('div',{class:'card'});

    card.appendChild($('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'8px'}},
      $('span',{style:{fontSize:'20px'}},ex.icon),
      $('div',{style:{flex:1}},
        $('div',{style:{fontWeight:'700',fontSize:'13px',color:'var(--text)'}},ex.name),
        $('div',{style:{fontSize:'11px',color:'#64748b'}},ex.reps+' · '+ex.charge+' · RPE '+ex.rpe+' · '+ex.freq),
      ),
      $('button',{class:'info-btn',onclick:(e)=>showTooltip(e,ex.note)},'?')
    ));

    // Passages de la journée
    card.appendChild($('div',{style:{fontSize:'10px',color:'#475569',fontWeight:'600',textTransform:'uppercase',letterSpacing:'.4px',marginBottom:'6px'}},'Passages aujourd\'hui:'));
    const passRow = $('div',{class:'sets-row'});
    for(let p=1;p<=4;p++){
      const done = exLog.passages.includes(p);
      const chip = $('div',{
        class:'set-chip'+(done?' done':''),
        onclick:()=>{
          const l=getLog(); const g=l.gtg||{};
          const el_=(g[ex.id]||{passages:[]});
          const idx=el_.passages.indexOf(p);
          if(idx>-1) el_.passages.splice(idx,1); else el_.passages.push(p);
          g[ex.id]=el_; l.gtg=g; saveLog(l); render();
        }
      }, done?'✓':'○', ` ${p}e passage`);
      passRow.appendChild(chip);
    }
    card.appendChild(passRow);

    // Note rapide
    const noteInput = $('input',{
      class:'input-field',type:'text',
      placeholder:'Note rapide…',
      style:{marginTop:'8px',fontSize:'12px',padding:'7px 10px'},
      value:exLog.note||'',
      oninput:(e)=>{
        const l=getLog(); const g=l.gtg||{};
        const ex_=(g[ex.id]||{passages:[]});
        ex_.note=e.target.value; g[ex.id]=ex_; l.gtg=g; saveLog(l);
      }
    });
    card.appendChild(noteInput);

    el.appendChild(card);
  });

  return el;
}

    const yr = viewDate.getFullYear(); const mo = viewDate.getMonth();
    const moNames = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
    // Couleurs par séance

function exportCSV(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('log:')).sort();
  if(!keys.length){alert('Aucun log à exporter.');return;}
  const H=['Date','Énergie','Motivation','Douleur','HRV','BOLT','Sommeil_h','Qualité_sommeil','Séance','RPE','Humeur','Notes_matin','Ressenti','Positif','À_améliorer'];
  const esc=v=>('"'+(v||'').toString().replace(/"/g,'""')+'"');
  const rows=[H.map(esc).join(',')];
  keys.forEach(k=>{
    try{
      const d=JSON.parse(localStorage.getItem(k));
      const m=d.matin||{};const s=d.soir||{};
      rows.push([k.slice(4),m.energie,m.motivation,m.douleur,m.hrv,m.bolt,m.sleep_hours,m.sleep_quality,
        s.seance,s.rpe,s.mood,m.notes,d.journal_ressenti,d.journal_positif,d.journal_ameliorer].map(esc).join(','));
    }catch(e){}
  });
  const blob=new Blob(['\uFEFF'+rows.join('\n')],{type:'text/csv;charset=utf-8'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='training-history-'+new Date().toISOString().slice(0,10)+'.csv';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}


function exportJSON(){
  const keys=Object.keys(localStorage).filter(k=>k.startsWith('log:')).sort();
  if(!keys.length){alert('Aucun log.');return;}
  const data={exportDate:new Date().toISOString(),programStart:localStorage.getItem('programStart')||null,totalJours:keys.length,logs:{}};
  keys.forEach(k=>{try{data.logs[k.slice(4)]=JSON.parse(localStorage.getItem(k));}catch(e){}});
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='training-backup-'+new Date().toISOString().slice(0,10)+'.json';a.click();
  setTimeout(()=>URL.revokeObjectURL(url),1000);
}

function importHistory(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=e=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const data=JSON.parse(ev.target.result);
        const logs=data.logs||data;
        const allDates=Object.keys(logs).filter(d=>d.match(/^\d{4}-\d{2}-\d{2}$/));
        const dateRange=allDates.length?allDates.sort()[0]+' au '+allDates.sort().slice(-1)[0]:'aucune';
        let n=0, merged=0;
        Object.entries(logs).forEach(([date,entry])=>{
          if(!date.match(/^\d{4}-\d{2}-\d{2}$/)) return; // skip non-date keys
          const existKey='log:'+date;
          const existing=localStorage.getItem(existKey);
          if(!existing){
            localStorage.setItem(existKey,JSON.stringify(entry)); n++;
          } else {
            // Fusion : compléter les champs manquants sans écraser ceux déjà remplis
            try{
              const cur=JSON.parse(existing);
              let changed=false;
              Object.entries(entry).forEach(([k,v])=>{
                if(cur[k]===undefined || cur[k]===null || cur[k]==='' || (typeof cur[k]==='object' && Object.keys(cur[k]||{}).length===0)){
                  cur[k]=v; changed=true;
                }
              });
              if(changed){ localStorage.setItem(existKey,JSON.stringify(cur)); merged++; }
            }catch(e){ localStorage.setItem(existKey,JSON.stringify(entry)); n++; }
          }
        });
        // Importer aussi les autres clés (baselines, ts, etc.) si présentes hors 'logs'
        if(data.logs){
          Object.entries(data).forEach(([k,v])=>{
            if(k==='logs'||k==='exportDate'||k==='programStart'||k==='totalJours') return;
            if(typeof v==='string' && !localStorage.getItem(k)){ localStorage.setItem(k,v); }
          });
        }
        alert('Fichier lu : '+allDates.length+' dates ('+dateRange+').\n\nRésultat : '+n+' nouvelle(s) + '+merged+' complétée(s).\n\nSi 0+0 : ces dates existent déjà identiques dans cette app.');
        render();
      }catch(ex){alert('Fichier invalide.');}
    };
    reader.readAsText(file);
  };
  input.click();
}


// ── ONGLET MOTEUR — mode maison/déplacement, matériel, durée, séances ──────
// Qualités jugées prioritaires selon le focus/cycle actif — sert à mettre en valeur les séances
// pertinentes (ex. ni VMA, ni VO2max, ni work capacity ne sont mis en avant en focus Force max).
function moteurRelevantQualities(){
  const info = moteurCycleInfo();
  if(!info) return null;
  if(info.type === 'force') return ['force_max'];
  if(info.type === 'puissance') return ['alactique','repetition_puissance'];
  if(info.type === 'prep_tests' || info.type === 'semaine_tests') return ['force_max'];
  return null;
}
function moteurSessionRelevant(session){
  const q = moteurRelevantQualities();
  if(!q) return false;
  return (session.qualites_prioritaires||[]).some(x=>q.includes(x));
}
